name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: true

      - name: Create source archives
        run: |
          zip -r source-${GITHUB_REF_NAME}.zip . 
          tar -czf source-${GITHUB_REF_NAME}.tar.gz .

      - name: Upload source zip
        uses: actions/upload-release-asset@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./source-${GITHUB_REF_NAME}.zip
          asset_name: source-${GITHUB_REF_NAME}.zip
          asset_content_type: application/zip

      - name: Upload source tar.gz
        uses: actions/upload-release-asset@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./source-${GITHUB_REF_NAME}.tar.gz
          asset_name: source-${GITHUB_REF_NAME}.tar.gz
          asset_content_type: application/gzip
